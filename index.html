<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KimOhLee</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- container start -->
    <div class="ma w1000 column">
      <!-- top start -->
      <div class="w1000 h100 row">
        <div class="w750 h100 center fs40">KimOhLee</div>
        <div class="w250 h100 center red">Login</div>
      </div>
      <!-- top end -->
      <!-- main start -->
      <div class="mt25 w1000 row">
        <!-- left start -->
        <div class="w400 column">
          <!-- grade start -->
          <div class="w400 center fs30">Total: 100.00% (A)</div>
          <!-- grade end -->
          <!-- groups start -->
          <div class="mt50 w400 column">
            <div class="bt w400 row">
              <div class="p5 w240 bold">Group</div>
              <div class="p5 w140 center bold">Weight</div>
            </div>
            <div class="bb w400 row">
              <div class="p5 w240">Group 1</div>
              <div class="p5 w140 center">50%</div>
            </div>
            <div class="bb w400 row">
              <div class="p5 w240">Group 2</div>
              <div class="p5 w140 center">50%</div>
            </div>
          </div>
          <!-- groups end -->
        </div>
        <!-- left end -->
        <!-- spacer start -->
        <div class="w100"></div>
        <!-- spacer end -->
        <!-- right start -->
        <div class="w500 column">
          <!-- group 1 start -->
          <div class="w500 column">
            <div class="bt w500 row">
              <div class="p5 w290 bold">Group 1</div>
              <div class="p5 w190 center bold">100.00%</div>
            </div>
            <div class="bb w500 row">
              <div class="p5 w290">Assignment 1</div>
              <div class="p5 w190 center">100 / 100</div>
            </div>
            <div class="bb w500 row">
              <div class="p5 w290">Assignment 2</div>
              <div class="p5 w190 center">100 / 100</div>
            </div>
          </div>
          <!-- group 1 end -->
          <!-- group 2 start -->
          <div class="mt50 w500 column">
            <div class="bt w500 row">
              <div class="p5 w290 bold">Group 2</div>
              <div class="p5 w190 center bold">100.00%</div>
            </div>
            <div class="bb w500 row">
              <div class="p5 w290">Assignment 1</div>
              <div class="p5 w190 center">100 / 100</div>
            </div>
            <div class="bb w500 row">
              <div class="p5 w290">Assignment 2</div>
              <div class="p5 w190 center">100 / 100</div>
            </div>
          </div>
          <!-- group 2 end -->
        </div>
        <!-- right end -->
      </div>
      <!-- main end -->
      <!-- bottom start -->
      <div class="mt25 w1000 h100 center">
        <a href="https://github.com/kimohlee/kimohlee.github.io" target="_blank">
          &copy; 2025 Ye-Hwan Kim, Jaehyeok Oh, and Siyun Lee
        </a>
      </div>
      <!-- bottom end -->
    </div>
    <!-- container end -->
  </body>
</html>
