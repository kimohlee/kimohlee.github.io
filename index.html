<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KimOhLee</title>
    <!-- style start -->
    <style>
      body {
        margin: 0;
        font-size: 20px;
        color: #47494a;
      }

      div {
        display: flex;

        /* temp */
        /* background-color: #0002; */
        /* border: 1px dashed black; */
      }

      a {
        color: #ab0000;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .column {
        flex-direction: column;
      }

      .row {
        flex-direction: row;
      }

      .center {
        align-items: center;
        justify-content: center;
      }

      .bold {
        font-weight: bold;
      }
    </style>
    <!-- style end -->
  </head>
  <body>
    <!-- container start -->
    <div class="column" style="margin: auto; width: 1000px">
      <!-- top start -->
      <div class="row" style="width: 1000px; height: 100px">
        <div class="center" style="width: 750px; height: 100px; font-size: 40px">KimOhLee</div>
        <div class="center" style="width: 250px; height: 100px; color: #ab0000">Login</div>
      </div>
      <!-- top end -->
      <!-- main start -->
      <div class="row" style="margin-top: 25px; width: 1000px">
        <!-- left start -->
        <div class="column" style="width: 400px">
          <!-- grade start -->
          <div class="center" style="width: 400px; font-size: 30px">Total: 100.00% (A)</div>
          <!-- grade end -->
          <!-- groups start -->
          <div class="column" style="margin-top: 50px; width: 400px">
            <div
              class="row"
              style="border-top: 1px solid #e8eaec; border-bottom: 1px solid #6a7883; width: 400px"
            >
              <div class="bold" style="padding: 5px; width: 240px">Group</div>
              <div class="center bold" style="padding: 5px; width: 140px">Weight</div>
            </div>
            <div class="row" style="border-bottom: 1px solid #e8eaec; width: 400px">
              <div style="padding: 5px; width: 240px">Group 1</div>
              <div class="center" style="padding: 5px; width: 140px">50%</div>
            </div>
            <div class="row" style="border-bottom: 1px solid #e8eaec; width: 400px">
              <div style="padding: 5px; width: 240px">Group 2</div>
              <div class="center" style="padding: 5px; width: 140px">50%</div>
            </div>
          </div>
          <!-- groups end -->
        </div>
        <!-- left end -->
        <!-- spacer start -->
        <div style="width: 100px"></div>
        <!-- spacer end -->
        <!-- right start -->
        <div class="column" style="width: 500px">
          <!-- group 1 start -->
          <div class="column" style="width: 500px">
            <div
              class="row"
              style="border-top: 1px solid #e8eaec; border-bottom: 1px solid #6a7883; width: 500px"
            >
              <div class="bold" style="padding: 5px; width: 290px">Group 1</div>
              <div class="center bold" style="padding: 5px; width: 190px">100.00%</div>
            </div>
            <div class="row" style="border-bottom: 1px solid #e8eaec; width: 500px">
              <div style="padding: 5px; width: 290px">Assignment 1</div>
              <div class="center" style="padding: 5px; width: 190px">100 / 100</div>
            </div>
            <div class="row" style="border-bottom: 1px solid #e8eaec; width: 500px">
              <div style="padding: 5px; width: 290px">Assignment 2</div>
              <div class="center" style="padding: 5px; width: 190px">100 / 100</div>
            </div>
          </div>
          <!-- group 1 end -->
          <!-- group 2 start -->
          <div class="column" style="margin-top: 50px; width: 500px">
            <div
              class="row"
              style="border-top: 1px solid #e8eaec; border-bottom: 1px solid #6a7883; width: 500px"
            >
              <div class="bold" style="padding: 5px; width: 290px">Group 2</div>
              <div class="center bold" style="padding: 5px; width: 190px">100.00%</div>
            </div>
            <div class="row" style="border-bottom: 1px solid #e8eaec; width: 500px">
              <div style="padding: 5px; width: 290px">Assignment 1</div>
              <div class="center" style="padding: 5px; width: 190px">100 / 100</div>
            </div>
            <div class="row" style="border-bottom: 1px solid #e8eaec; width: 500px">
              <div style="padding: 5px; width: 290px">Assignment 2</div>
              <div class="center" style="padding: 5px; width: 190px">100 / 100</div>
            </div>
          </div>
          <!-- group 2 end -->
        </div>
        <!-- right end -->
      </div>
      <!-- main end -->
      <!-- bottom start -->
      <div class="center" style="margin-top: 25px; width: 1000px; height: 100px">
        <a href="https://github.com/kimohlee/kimohlee.github.io" target="_blank">
          &copy; 2025 Ye-Hwan Kim, Jaehyeok Oh, and Siyun Lee
        </a>
      </div>
      <!-- bottom end -->
    </div>
    <!-- container end -->
  </body>
</html>
